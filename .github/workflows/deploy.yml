name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT != '' && vars.SSH_PORT || 22 }}
          envs: DOMAIN,IMAGE,GITHUB_TOKEN,GITHUB_ACTOR,REPOSITORY
          script: |
            set -euo pipefail

            DEPLOY_DIR=/opt/api.settime.ru

            if [ -z "${DOMAIN}" ]; then
              echo "DOMAIN is not set in GitHub → Settings → Secrets and variables → Actions → Variables"
              exit 1
            fi

            if [ ! -d "${DEPLOY_DIR}" ]; then
              echo "Create ${DEPLOY_DIR} on the VPS first:"
              echo "  sudo mkdir -p ${DEPLOY_DIR} && sudo chown ${USER}:${USER} ${DEPLOY_DIR}"
              exit 1
            fi

            if [ ! -d "${DEPLOY_DIR}/.git" ]; then
              git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git" "${DEPLOY_DIR}"
            fi

            cd "${DEPLOY_DIR}"
            git fetch origin main
            git reset --hard origin/main

            cat > .env <<EOF
            DOMAIN=${DOMAIN}
            IMAGE=${IMAGE}
            EOF

            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f
