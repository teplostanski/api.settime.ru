services:
  time-server:
    build: .
    container_name: api.settime.ru
    restart: unless-stopped
    environment:
      PORT: 8080
      NTP_HOST: ${NTP_HOST:-pool.ntp.org,time.google.com,time.cloudflare.com}
      NTP_PORT: ${NTP_PORT:-123}
      NTP_TIMEOUT_MS: ${NTP_TIMEOUT_MS:-5000}
      NTP_SYNC_INTERVAL_MS: ${NTP_SYNC_INTERVAL_MS:-3600000}
      NTP_STARTUP_ATTEMPTS: ${NTP_STARTUP_ATTEMPTS:-3}
