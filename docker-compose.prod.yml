services:
  time-server:
    image: ${IMAGE:?set IMAGE in .env}
    pull_policy: always
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.api-settime-http.rule=Host(`${DOMAIN:?set DOMAIN in .env}`)
      - traefik.http.routers.api-settime-http.entrypoints=web
      - traefik.http.routers.api-settime-http.middlewares=redirect-https
      - traefik.http.routers.api-settime.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.api-settime.entrypoints=websecure
      - traefik.http.routers.api-settime.tls=true
      - traefik.http.routers.api-settime.tls.certresolver=letsencrypt
      - traefik.http.services.api-settime.loadbalancer.server.port=8080

networks:
  proxy:
    external: true
